server:
  listen: 10.10.10.12@53

mod-dnstap:
  - id: tap
    sink: "unix:/tmp/dnstap.sock"
    log-queries: on
    log-responses: on

key:
  - id: tsig-master-slave
    algorithm: hmac-sha256
    secret: "replace_with_base64_secret"

remote:
  - id: site_a_primary
    address: 10.10.10.11@53
    key: tsig-master-slave
  - id: site_b_primary
    address: 10.10.20.11@53
    key: tsig-master-slave

acl:
  - id: allow_notify
    # Address removed to allow NOTIFY from either Site A or Site B Master across NAT/routing boundaries
    key: tsig-master-slave
    action: notify

template:
  - id: default
    global-module: mod-dnstap/tap
    storage: /var/lib/knot
    file: "%s.zone"

zone:
  - domain: domain.local
    # To switch master to Site B, change this to: master: site_b_primary
    master: site_a_primary
    acl: allow_notify
