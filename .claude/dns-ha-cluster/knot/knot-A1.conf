# /etc/knot/knot.conf  --  Knot-A1  (10.10.10.11)  -- PRIMARY MASTER
# Site A, Network 10.10.10.0/24

server:
  listen: 10.10.10.11@53
  listen: 10.10.10.11@853
  rundir: "/run/knot"
  user: knot:knot

include: /etc/knot/keys.conf

log:
  - target: syslog
    any: info

mod-dnstap:
  - id: tap
    sink: "unix:/run/knot/dnstap.sock"
    log-queries: on
    log-responses: on

# ---------------------------------------------------------------------
# Remotes: local slaves (A2, A3) + inter-site peer (B1, the standby master)
# ---------------------------------------------------------------------
remote:
  - id: a2
    address: 10.10.10.12@53
    key: xfr_site_a
  - id: a3
    address: 10.10.10.13@53
    key: xfr_site_a
  - id: b1
    address: 10.10.20.11@53
    key: xfr_intersite

# ---------------------------------------------------------------------
# ACLs
#  - allow_a2_a3_xfr / notify : local slaves pull zone, receive NOTIFY
#  - allow_b1_xfr             : B1 (standby master) is allowed to AXFR/IXFR
#                               from A1 at all times (keeps B1 hot-warm)
#  - allow_b1_notify          : dormant in steady state (A1 is master, so B1
#                               never NOTIFYs A1) - kept enabled so that if
#                               roles are ever swapped back mid-incident, no
#                               ACL edit is required, only master: property.
# ---------------------------------------------------------------------
acl:
  - id: allow_a2_a3_xfr
    address: [10.10.10.12, 10.10.10.13]
    key: xfr_site_a
    action: transfer
  - id: allow_b1_xfr
    address: 10.10.20.11
    key: xfr_intersite
    action: transfer
  - id: allow_b1_notify
    address: 10.10.20.11
    key: xfr_intersite
    action: notify

template:
  - id: default
    global-module: mod-dnstap/tap
    storage: /var/lib/knot
    file: "%s.zone"
    serial-policy: unixtime
    semantic-checks: on
    journal-content: changes
    zonefile-sync: -1
    zonefile-load: difference-no-serial

# ---------------------------------------------------------------------
# Zone: domain.local -- A1 has NO "master:" property -> it IS the master.
# ---------------------------------------------------------------------
zone:
  - domain: domain.local
    notify: [a2, a3]
    acl: [allow_a2_a3_xfr, allow_b1_xfr, allow_b1_notify]
