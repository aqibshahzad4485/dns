# /etc/knot/knot.conf  --  Knot-B2  (10.10.20.12)  -- Slave 1, Site B

server:
  listen: 10.10.20.12@53
  rundir: "/run/knot"
  user: knot:knot

include: /etc/knot/keys.conf

log:
  - target: syslog
    any: info

# b1 -> normal operation (Site B standby master, always local)
# a1 -> emergency-only cross-site option, mirrors A2/A3 design
remote:
  - id: b1
    address: 10.10.20.11@53
    key: xfr_site_b
  - id: a1
    address: 10.10.10.11@53
    key: xfr_intersite

acl:
  - id: allow_b1_notify
    address: 10.10.20.11
    key: xfr_site_b
    action: notify
  - id: allow_a1_notify
    address: 10.10.10.11
    key: xfr_intersite
    action: notify

template:
  - id: default
    storage: /var/lib/knot
    file: "%s.zone"
    semantic-checks: on
    journal-content: changes

zone:
  - domain: domain.local
    master: b1
    acl: [allow_b1_notify, allow_a1_notify]
