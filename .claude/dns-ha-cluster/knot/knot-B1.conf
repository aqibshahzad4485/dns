# /etc/knot/knot.conf  --  Knot-B1  (10.10.20.11)  -- STANDBY MASTER
# Site B, Network 10.10.20.0/24
#
# Steady state: B1 is a SLAVE of A1 (master: a1). It receives AXFR/IXFR +
# NOTIFY from A1, and redistributes to its own local slaves B2/B3.
# During a Site-A DR event, B1 is promoted (master: property removed) to
# become the writable master. See scripts/promote-site-b.sh.

server:
  listen: 10.10.20.11@53
  listen: 10.10.20.11@853
  rundir: "/run/knot"
  user: knot:knot

include: /etc/knot/keys.conf

log:
  - target: syslog
    any: info

mod-dnstap:
  - id: tap
    sink: "unix:/run/knot/dnstap.sock"
    log-queries: on
    log-responses: on

remote:
  - id: b2
    address: 10.10.20.12@53
    key: xfr_site_b
  - id: b3
    address: 10.10.20.13@53
    key: xfr_site_b
  - id: a1
    address: 10.10.10.11@53
    key: xfr_intersite

# ---------------------------------------------------------------------
# ACLs
#  - allow_b2_b3_xfr  : local slaves pull zone
#  - allow_a1_xfr      : A1 is allowed to AXFR/IXFR FROM B1 at all times.
#                        This is what lets A1 re-sync from B1 after a
#                        promotion, without any ACL change being needed.
#  - allow_a1_notify   : dormant in steady state (B1 is slave, so it
#                        never needs to accept NOTIFY from A1 here --
#                        NOTIFY is received via the "master" relationship
#                        automatically). Kept for symmetry/DR-readiness.
# ---------------------------------------------------------------------
acl:
  - id: allow_b2_b3_xfr
    address: [10.10.20.12, 10.10.20.13]
    key: xfr_site_b
    action: transfer
  - id: allow_a1_xfr
    address: 10.10.10.11
    key: xfr_intersite
    action: transfer
  - id: allow_a1_notify
    address: 10.10.10.11
    key: xfr_intersite
    action: notify

template:
  - id: default
    global-module: mod-dnstap/tap
    storage: /var/lib/knot
    file: "%s.zone"
    serial-policy: unixtime
    semantic-checks: on
    journal-content: changes
    zonefile-sync: -1
    zonefile-load: difference-no-serial

zone:
  - domain: domain.local
    master: a1
    notify: [b2, b3]
    acl: [allow_b2_b3_xfr, allow_a1_xfr, allow_a1_notify]
