# /etc/knot/keys.conf
# Deploy this IDENTICAL file to all 6 Knot nodes (A1,A2,A3,B1,B2,B3).
# chown root:knot /etc/knot/keys.conf && chmod 640 /etc/knot/keys.conf
#
# Regenerate for real deployments with:
#   keymgr -t xfr_site_a hmac-sha256
#   keymgr -t xfr_site_b hmac-sha256
#   keymgr -t xfr_intersite hmac-sha256
# then paste the generated blocks in place of the example secrets below.

key:
  - id: xfr_site_a
    algorithm: hmac-sha256
    secret: 9PUfX2eXrbUlXnn9rTwXIoN7Pz0zYooJ0mi3R1GiPko=

  - id: xfr_site_b
    algorithm: hmac-sha256
    secret: G/fSh2U+6B+CTTLe+OjpMk/l209eYYurVPUmt8mn1tk=

  - id: xfr_intersite
    algorithm: hmac-sha256
    secret: Fpnby8crHJ9E4GpRGK9wCf29CjWCYYxby/p1/+2YZ0g=
