# /etc/knot/knot.conf  --  Knot-A3  (10.10.10.13)  -- Slave 2, Site A

server:
  listen: 10.10.10.13@53
  rundir: "/run/knot"
  user: knot:knot

include: /etc/knot/keys.conf

log:
  - target: syslog
    any: info

# ---------------------------------------------------------------------
# Two candidate masters are defined:
#   a1 -> normal operation (Site A primary master)
#   b1 -> emergency-only: used if A1 is down for an extended period and
#         you choose to re-point Site A's local slaves directly at the
#         promoted Site B master across the WAN link (see runbook §7).
# Only ONE is ever active via zone: master: <id> at a time.
# ---------------------------------------------------------------------
remote:
  - id: a1
    address: 10.10.10.11@53
    key: xfr_site_a
  - id: b1
    address: 10.10.20.11@53
    key: xfr_intersite

acl:
  - id: allow_a1_notify
    address: 10.10.10.11
    key: xfr_site_a
    action: notify
  - id: allow_b1_notify
    address: 10.10.20.11
    key: xfr_intersite
    action: notify

template:
  - id: default
    storage: /var/lib/knot
    file: "%s.zone"
    semantic-checks: on
    journal-content: changes

zone:
  - domain: domain.local
    master: a1
    acl: [allow_a1_notify, allow_b1_notify]
