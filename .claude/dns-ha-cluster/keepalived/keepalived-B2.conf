# /etc/keepalived/keepalived.conf  --  DNSDist-B2  (10.10.20.17)  -- Site B
global_defs {
    router_id DNSDIST_B2
    enable_script_security
    script_user root
    vrrp_garp_master_delay 1
}

vrrp_script chk_dnsdist {
    script "/usr/local/bin/check-dnsdist.sh"
    interval 2
    timeout 2
    rise 2
    fall 2
    weight -50
}

vrrp_instance VI_DNS_B {
    state BACKUP
    interface eth0
    virtual_router_id 52          # unique per site (A=51, B=52)
    priority 100
    advert_int 1
    preempt_delay 30

    authentication {
        auth_type PASS
        auth_pass CHANGE_ME_VRRP_PASS_B
    }

    virtual_ipaddress {
        10.10.20.10/24 dev eth0    # NOTE: corrected - must be in 10.10.20.0/24
    }

    track_script {
        chk_dnsdist
    }

    notify_master "/usr/local/bin/vrrp-notify.sh MASTER"
    notify_backup "/usr/local/bin/vrrp-notify.sh BACKUP"
    notify_fault  "/usr/local/bin/vrrp-notify.sh FAULT"
}
