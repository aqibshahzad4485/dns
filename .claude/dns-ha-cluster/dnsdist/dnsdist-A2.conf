-- /etc/dnsdist/dnsdist.conf  --  DNSDist-A2  (10.10.10.17)  -- Site A
----------------------------------------------------------------------
-- Global listeners
----------------------------------------------------------------------
setLocal("10.10.10.17:53")               -- bind to this host's own IP,
                                          -- NOT 0.0.0.0 (VIP is handled by
                                          -- keepalived on the same host)
addLocal("10.10.10.10:53")               -- also listen on the VIP address
                                          -- (needed so the box answers on
                                          -- the VIP the instant it becomes
                                          -- MASTER)

-- Only the two internal DNS subnets may query us (no internet, LAN only)
setACL({"10.10.10.0/24", "10.10.20.0/24", "127.0.0.0/8"})

----------------------------------------------------------------------
-- Packet cache
----------------------------------------------------------------------
pc = newPacketCache(100000, {
    maxTTL = 300,
    minTTL = 10,
    staleTTL = 60,
    temporaryFailureTTL = 30,
    dontAge = false
})
getPool(""):setCache(pc)
getPool("local"):setCache(pc)
getPool("remote"):setCache(pc)

----------------------------------------------------------------------
-- Backend servers
--   pool "local"  = Site A slaves (preferred)
--   pool "remote" = Site B slaves (used only if pool "local" is empty,
--                   i.e. both A2 and A3 are down/unreachable)
-- Masters (A1/B1) are intentionally NOT backends here - they should
-- only ever be hit for AXFR/IXFR, never for client query load.
----------------------------------------------------------------------
newServer({
    address    = "10.10.10.12:53",
    name       = "Knot-A2",
    pool       = "local",
    checkType  = "A",
    checkName  = "_dns-health.domain.local",
    checkInterval = 2,
    maxCheckFailures = 2
})
newServer({
    address    = "10.10.10.13:53",
    name       = "Knot-A3",
    pool       = "local",
    checkType  = "A",
    checkName  = "_dns-health.domain.local",
    checkInterval = 2,
    maxCheckFailures = 2
})
newServer({
    address    = "10.10.20.12:53",
    name       = "Knot-B2",
    pool       = "remote",
    checkType  = "A",
    checkName  = "_dns-health.domain.local",
    checkInterval = 2,
    maxCheckFailures = 2
})
newServer({
    address    = "10.10.20.13:53",
    name       = "Knot-B3",
    pool       = "remote",
    checkType  = "A",
    checkName  = "_dns-health.domain.local",
    checkInterval = 2,
    maxCheckFailures = 2
})

----------------------------------------------------------------------
-- Routing policy: strict local-first, fall back to remote site only
-- when ALL local backends are down. Requires dnsdist >= 1.6.
----------------------------------------------------------------------
setServerPolicy(leastOutstanding)
addAction(PoolAvailableRule("local"), PoolAction("local"))
addAction(AllRule(), PoolAction("remote"))

----------------------------------------------------------------------
-- Security
----------------------------------------------------------------------
addAction(QTypeRule(DNSQType.ANY), RCodeAction(DNSRCode.REFUSED))
addAction(MaxQPSIPRule(1000), DropAction())
addAction(TCPRule(false), MaxQPSRule(5000))     -- simple UDP flood guard
setMaxUDPOutstanding(65535)

----------------------------------------------------------------------
-- Web UI / API - loopback only, tunnel via SSH if remote access needed
----------------------------------------------------------------------
webserver("127.0.0.1:8083")
setWebserverConfig({
    password = "CHANGE_ME_STRONG_PASSWORD",
    apiKey   = "CHANGE_ME_STRONG_API_KEY",
    acl      = "127.0.0.1"
})

----------------------------------------------------------------------
-- Stats / logging
----------------------------------------------------------------------
setRingBuffersSize(500000)
setVerboseHealthChecks(true)
